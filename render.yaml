# ScopeIt - Render Deployment Configuration
# Deploy at: https://dashboard.render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: scopeit-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: cd /opt/render/project/src/backend && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # NeonDB (set in dashboard)
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      # CORS - update after Vercel deploy (add your Vercel URL)
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Google OAuth (set in dashboard)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Beta
      - key: BETA_MODE
        value: "True"
      - key: BETA_END_DATE
        value: "2026-06-30"
      # Cloudflare R2 (set in dashboard)
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: scopeit-uploads
      # External services (set in dashboard)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@scopeit.work
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"

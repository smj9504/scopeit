# ScopeIt - Render Deployment Configuration
# Deploy at: https://dashboard.render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: scopeit-api
    runtime: python
    plan: starter  # $7/month (upgrade to standard if OOM)
    region: oregon
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "False"
      # NeonDB (external - set in dashboard)
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://scopeit.work,https://www.scopeit.work
      - key: FRONTEND_URL
        value: https://scopeit.work
      - key: GOOGLE_REDIRECT_URI
        value: https://api.scopeit.work/api/auth/google/callback
      - key: BETA_MODE
        value: "True"
      - key: BETA_END_DATE
        value: "2026-06-30"
      # Cloudflare R2
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: scopeit-uploads
      # External services (set in dashboard)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EMAIL_FROM
        value: noreply@scopeit.work
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"

# ScopeIt - Render Deployment Configuration
# Deploy backend at: https://dashboard.render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: scopeit-api
    env: python
    plan: starter  # $7/month
    region: oregon
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: scopeit-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://scopeit.work,https://www.scopeit.work
      - key: FRONTEND_URL
        value: https://scopeit.work
      - key: GOOGLE_REDIRECT_URI
        value: https://api.scopeit.work/api/auth/google/callback
      - key: BETA_MODE
        value: "True"
      - key: BETA_END_DATE
        value: "2026-06-30"
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false  # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: EMAIL_FROM
        value: noreply@scopeit.work

databases:
  - name: scopeit-db
    databaseName: scopeit
    user: scopeit
    plan: starter  # Free tier: 1GB, 97 days active
    region: oregon
